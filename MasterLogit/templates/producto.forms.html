{% extends "base.html" %}

{% block contenido %}

<h2>Nuevo Producto</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre">

<br>

<label>Cantidad</label>
<input type="number" name="cantidad">

<br>

<label>Precio</label>
<input type="number" step="0.01" name="precio">

<br>

<button type="submit">Guardar</button>

</form>

{% endblock %}
